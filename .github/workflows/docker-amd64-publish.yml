name: Publish amd64 Docker image

on:
  push:
    branches:
      - dev/account-guard
  workflow_dispatch:
    inputs:
      specific_tag:
        description: 'Optional Docker tag to publish; defaults to dev'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Docker tag
        id: docker_tag
        env:
          INPUT_TAG: ${{ inputs.specific_tag }}
        run: |
          raw_tag="${INPUT_TAG:-dev}"
          specific_tag=$(printf '%s' "$raw_tag" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^[^a-z0-9]+//; s/[._-]+$//' | cut -c1-128)

          if [[ ! "$specific_tag" =~ ^[a-z0-9][a-z0-9._-]{0,127}$ ]]; then
            echo "Unable to generate a valid Docker tag from: $raw_tag" >&2
            exit 1
          fi

          echo "specific_tag=$specific_tag" >> "$GITHUB_OUTPUT"
          echo "Using Docker tag: $specific_tag"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert image name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=${{ steps.docker_tag.outputs.specific_tag }}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
